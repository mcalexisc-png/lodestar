name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: none of the jobs write to the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-syntax:
    name: Python syntax (compileall)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      # Byte-compile sources — catches syntax errors without installing deps.
      - run: python -m compileall -q app.py core routes src services scripts tests

  node-syntax:
    name: JS syntax (node --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
      # Syntax-check our own JS (skip vendored libs in static/lib).
      - name: node --check
        run: |
          shopt -s globstar nullglob
          for f in static/app.js static/js/**/*.js; do
            node --check "$f"
          done

  lint-and-typecheck:
    name: Lint & typecheck (ruff, mypy)
    runs-on: ubuntu-latest
    # Informational for now: the codebase has pre-existing findings under
    # both tools that predate this job. Make required once triaged.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy app.py core routes src services scripts

  cold-start-smoke:
    name: Cold-start & idle-RSS smoke test (lite)
    runs-on: ubuntu-latest
    # Informational for now: thresholds are generous headroom over the local
    # baseline in docs/benchmarks/phase2-baseline.md; tighten once this has
    # run on CI hardware long enough to set a real ceiling.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: mkdir -p data  # sqlite DB lives at ./data/app.db

      - name: Boot in LODESTAR_LITE mode and measure cold-start + idle RSS
        env:
          LODESTAR_LITE: "true"
        run: |
          python -m uvicorn app:app --host 127.0.0.1 --port 7000 --workers 1 &
          PID=$!

          # Poll /api/health until it returns 200, or time out.
          ready=0
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7000/api/health || true)
            if [ "$code" = "200" ]; then
              ready=1
              echo "Ready after $((i / 2))s ($i polls @ 0.5s)"
              break
            fi
            sleep 0.5
          done
          if [ "$ready" != "1" ]; then
            echo "App did not become healthy within 60s"
            kill "$PID" 2>/dev/null || true
            exit 1
          fi

          # Let background startup tasks settle, then sample idle RSS.
          sleep 5
          rss_kb=$(grep VmRSS /proc/$PID/status | awk '{print $2}')
          echo "Idle RSS: ${rss_kb} KB"

          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true

          # Generous ceiling — local full-mode baseline is ~210 MB; CI
          # installs the same deps regardless of LODESTAR_LITE, so allow
          # headroom for runner variance.
          max_rss_kb=600000
          if [ "$rss_kb" -gt "$max_rss_kb" ]; then
            echo "Idle RSS ${rss_kb} KB exceeds ${max_rss_kb} KB threshold"
            exit 1
          fi

  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    # Informational for now: the suite has known flaky / environment-dependent
    # failures (test isolation + embedding-model assertions). Tracked under the
    # ROADMAP "fresh install smoke tests" item; make this required once green.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Detect whether this PR only touches documentation files.
      # If so, skip the expensive pytest run while still reporting a passing check.
      - name: Check for docs-only changes
        id: docs-check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # List all changed files; if every file matches docs/markdown patterns, skip pytest.
          changed=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          non_docs=$(echo "$changed" | grep -Ev '^(docs/|.*\.md$|\.github/[^/]+\.md$)' || true)
          if [ -z "$non_docs" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected — skipping pytest."
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        if: steps.docs-check.outputs.docs_only != 'true'
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
        if: steps.docs-check.outputs.docs_only != 'true'
      - run: mkdir -p data  # sqlite DB lives at ./data/app.db
        if: steps.docs-check.outputs.docs_only != 'true'
      - run: python -m pytest -q
        if: steps.docs-check.outputs.docs_only != 'true'
